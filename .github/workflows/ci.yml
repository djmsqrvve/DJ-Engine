name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  RUSTC_WRAPPER: ""
  CARGO_TARGET_DIR: /home/runner/.cargo-targets/dj_engine_bevy18

jobs:
  workspace-validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libx11-dev \
            libx11-xcb-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            clang \
            lld \
            cmake \
            git

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.94.0
          rustup show

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Validate test count
        run: |
          test_count=$(cargo test --workspace -- --list 2>/dev/null | grep -c ': test$')
          echo "Test count: $test_count"
          if [ "$test_count" -lt 400 ]; then
            echo "FAILED: Test count regression ($test_count < 400)"
            exit 1
          fi
